  <rect x="70" y="356" width="6" height="6" rx="1" fill="#34d399"/>
  <text x="85" y="364" fill="#94a3b8" font-size="10">分隔线：border-right 实现列间视觉分离，与深色主题一致</text>

  <rect x="70" y="374" width="6" height="6" rx="1" fill="#fbbf24"/>
  <text x="85" y="382" fill="#94a3b8" font-size="10">占位符：空字段显示半透明 '无留言' / '无中继'，与有效数据区分</text>

  <rect x="570" y="338" width="6" height="6" rx="1" fill="#a78bfa"/>
