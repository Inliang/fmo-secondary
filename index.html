<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMO Secondary Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 顶部通联条 (Speaking Bar) ===== -->
  <div id="speaking-bar" class="speaking-bar idle">
    <div class="speaking-bar-inner">
      <span id="sb-callsign" class="sb-callsign">--</span>
      <div class="sb-tags">
        <span id="sb-grid" class="sb-grid-tag"></span>
        <span id="sb-direction" class="sb-dir"></span>
        <span id="sb-distance" class="sb-dist"></span>
        <span id="sb-qth" class="sb-qth"></span>
      </div>
      <div class="sb-meta">
        <span id="sb-server" class="sb-server-name"></span>
        <span id="sb-contact-count" class="sb-contact-count"></span>
        <span id="sb-elapsed" class="sb-elapsed"></span>
      </div>
      <div id="sb-placeholder" class="sb-placeholder">等待通联...</div>
    </div>
    <div id="sb-audio-icon" class="sb-audio-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </div>
  </div>

  <!-- ===== 二行信息条 (Device + Server 并排) ===== -->
  <div class="info-row">
    <div class="info-panel info-device">
      <div class="info-panel-header">
        <span>DEVICE</span>
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text" class="status-text">未连接</span>
      </div>
      <div class="info-tags" id="device-tags">
        <span class="info-tag"><span class="info-tag-label">IP</span><span id="dev-ip">--</span></span>
        <span class="info-tag"><span class="info-tag-label">VER</span><span id="dev-version">--</span></span>
        <span class="info-tag"><span class="info-tag-label">MAC</span><span id="dev-mac">--</span></span>
        <span class="info-tag"><span class="info-tag-label">HW</span><span id="dev-hw">--</span></span>
      </div>
    </div>
    <div class="info-divider"></div>
    <div class="info-panel info-server">
      <div class="info-panel-header">
        <span>SERVER</span>
        <span id="server-ping" class="server-ping">--</span>
      </div>
      <div class="info-tags">
        <span id="server-name-display" class="info-tag server-name-tag">--</span>
        <span id="server-addr" class="info-tag">--</span>
      </div>
    </div>
  </div>

  <!-- ===== 最近发言列表 ===== -->
  <section class="list-section">
    <div class="list-section-header">
      <span>RECENT SPEAKERS</span>
      <span class="list-section-count" id="recent-count">0</span>
    </div>
    <div id="recent-speakers" class="item-list">
      <div class="list-empty">暂无最近发言</div>
    </div>
  </section>

  <!-- ===== QSO 通联列表 ===== -->
  <section class="list-section">
    <div class="list-section-header">
      <span>QSO LOG</span>
      <span class="list-section-count" id="qso-count">0</span>
    </div>
    <div id="qso-container" class="item-list">
      <div class="list-empty">暂无通联记录</div>
    </div>
  </section>

  <!-- 服务器列表（隐藏的下拉面板） -->
  <div id="server-list-overlay" class="server-list-overlay">
    <div class="server-list-dropdown">
      <div class="server-list-title">切换服务器</div>
      <input id="server-search" class="server-search" type="text" placeholder="搜索服务器...">
      <div id="server-list-container" class="server-list-scroll"></div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-overlay" class="overlay">
    <div class="overlay-box">
      <h2>设置</h2>
      <div class="settings-row">
        <label>IP / 主机</label>
        <input id="fmo-ip" type="text" placeholder="192.168.x.x">
      </div>
      <div class="settings-row">
        <label>端口</label>
        <input id="fmo-port" type="text" value="80">
      </div>
      <div class="settings-row">
        <label>协议</label>
        <select id="fmo-protocol">
          <option value="ws">ws</option>
          <option value="wss">wss</option>
        </select>
      </div>
      <div class="overlay-btns">
        <button id="settings-save" class="btn-accent">保存并连接</button>
        <button id="settings-close" class="btn-muted">取消</button>
      </div>
    </div>
  </div>

  <!-- 功能菜单 -->
  <div class="feature-dock">
    <button id="feature-btn" class="feature-btn" title="更多功能">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
    <div id="feature-menu" class="feature-menu">
      <div id="menu-export" class="feature-menu-item">导出 ADIF</div>
      <div id="menu-settings" class="feature-menu-item">设置</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
